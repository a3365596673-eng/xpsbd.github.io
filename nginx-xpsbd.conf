server {
    listen 80;
    server_name xpsbd.com www.xpsbd.com;
    root /var/www/xpsbd;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
